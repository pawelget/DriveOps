version: "3.9"

services:

  database:
    image: postgres:15
    container_name: CarManagementDB

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: CarManagementDB

    ports:
      - "5432:5432"

    volumes:
      - ./database/CarManagementDB.sql:/docker-entrypoint-initdb.d/CarManagementDB.sql
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./backend/backend

    container_name: driveops_backend

    restart: always

    depends_on:
      - database

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: CarManagementDB
      DB_USER: postgres
      DB_PASSWORD: admin

    ports:
      - "5000:5000"

    volumes:
      - ./backend/backend:/app


  frontend:
    build:
      context: ./frontend

    container_name: driveops_frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:80"


volumes:
  postgres_data: