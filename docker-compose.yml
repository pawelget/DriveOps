services:
  postgres:
    image: postgres:15
    container_name: CarManagementDB
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: CarManagementDB
    ports:
      - "5432:5432"
    volumes:
      - ./CarManagementDB.sql:/docker-entrypoint-initdb.d/CarManagementDB.sql
